name: Compile Compressed Prompts

on:
  push:
    paths:
      - 'estimator-prompts/**'
      - 'offer-prompts/**'
      - 'generalist-prompts/fast-offer/**'
  workflow_dispatch: # Allows manual triggering

permissions:
  contents: write

jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Merge and Compress Prompts
        run: |
          mkdir -p output

          # ── 1. ESTIMATION PROMPT (scoring only, NO offer prompts) ──
          echo "" > output/final_prompt.txt
          for file in $(ls estimator-prompts/* | sort); do
            echo "--- START OF $file ---" >> output/final_prompt.txt
            cat "$file" >> output/final_prompt.txt
            echo -e "\n" >> output/final_prompt.txt
          done

          # ── 2. OFFER PROMPT (dedicated offer writing) ──
          echo "" > output/offer_prompt.txt
          for file in $(ls offer-prompts/* | sort); do
            echo "--- START OF $file ---" >> output/offer_prompt.txt
            cat "$file" >> output/offer_prompt.txt
            echo -e "\n" >> output/offer_prompt.txt
          done

          # ── 3. FAST OFFER PROMPT (reference/legacy) ──
          echo "" > output/fast_offer_prompt.txt
          for file in $(ls generalist-prompts/fast-offer/* | sort); do
            echo "--- START OF $file ---" >> output/fast_offer_prompt.txt
            cat "$file" >> output/fast_offer_prompt.txt
            echo -e "\n" >> output/fast_offer_prompt.txt
          done

          echo "Merging complete."

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compiled-prompts
          path: |
            output/final_prompt.txt
            output/offer_prompt.txt
            output/fast_offer_prompt.txt

      - name: Commit Merged Prompts
        run: |
          git config --local user.email "oleksiy.perepelytsya@gmail.com"
          git config --local user.name "GitHub Action"
          git add output/final_prompt.txt
          git add output/offer_prompt.txt
          git add output/fast_offer_prompt.txt
          git commit -m "chore: update compiled prompts [skip ci]" || exit 0
          git push
